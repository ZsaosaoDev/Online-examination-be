spring.application.name=${APP_NAME:springboot-meet}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/meet_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Server Configuration
server.port=${SERVER_PORT:8080}
# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.userNameAttribute=sub
# Frontend Configuration
frontend.callback-url=${FRONTEND_CALLBACK_URL:http://localhost:4200/auth/google-callback}
app.frontend.verify-url=${FRONTEND_VERIFY_URL:http://localhost:4200/auth/verify}
refresh.token.max-age=${REFRESH_TOKEN_MAX_AGE:604800}
# JWT Configuration
jwt.access-token-expiration=${ACCESS_TOKEN_EXPIRATION:900000}
jwt.secret=${JWT_SECRET}
