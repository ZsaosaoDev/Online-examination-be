# =============================================
# Server
# =============================================
server.port=8080
# =============================================
# PostgreSQL
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/springboot_meet}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =============================================
# Redis
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET:default-secret-key-change-me-in-production-at-least-32-chars}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
# =============================================
# Refresh Token
# =============================================
refresh.token.max-age=${REFRESH_TOKEN_MAX_AGE:604800}
# =============================================
# OAuth2
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
# Uncomment when you have actual client IDs:
# spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
# spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.github.scope=user:email,read:user
# spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:}
# spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.facebook.scope=email,public_profile
# Frontend
# =============================================
frontend.callback-url=${FRONTEND_CALLBACK_URL:http://localhost:3000/auth/callback}
app.frontend.verify-url=${FRONTEND_VERIFY_URL:http://localhost:3000/auth/verify}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# =============================================
# Mail (SMTP)
# =============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
